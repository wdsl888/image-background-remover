<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>飞机大战</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { background: #1a1a2e; border: 4px solid #0ff; box-shadow: 0 0 30px rgba(0,255,255,0.3); }
    </style>
</head>
<body>
<canvas id="game" width="480" height="700"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 游戏状态
let gameOver = false;
let score = 0;
let level = 1;
let keys = {};

// 玩家
const player = {
    x: 220, y: 600, w: 40, h: 50,
    speed: 6,
    bullets: [],
    bulletTimer: 0
};

// 敌人
let enemies = [];
let enemyTimer = 0;
let enemyBullets = [];

// 粒子效果
let particles = [];

// 键盘
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (gameOver) return;
    
    // 玩家移动
    if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
    if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.w) player.x += player.speed;
    if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
    if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.h) player.y += player.speed;
    
    // 玩家射击
    player.bulletTimer++;
    if (player.bulletTimer > 10) {
        player.bullets.push({ x: player.x + 15, y: player.y, w: 10, h: 20, speed: 10 });
        player.bulletTimer = 0;
    }
    
    // 更新玩家子弹
    player.bullets.forEach(b => b.y -= b.speed);
    player.bullets = player.bullets.filter(b => b.y > -20);
    
    // 敌人生成
    enemyTimer++;
    if (enemyTimer > 40 - level * 3) {
        enemies.push({
            x: Math.random() * (canvas.width - 40),
            y: -40,
            w: 40, h: 40,
            speed: 2 + Math.random() * 2,
            hp: 1 + Math.floor(level / 3)
        });
        enemyTimer = 0;
    }
    
    // 更新敌人
    enemies.forEach(e => {
        e.y += e.speed;
        // 敌人射击
        if (Math.random() < 0.02) {
            enemyBullets.push({ x: e.x + 15, y: e.y + 40, w: 8, h: 15, speed: 5 });
        }
    });
    enemies = enemies.filter(e => e.y < canvas.height);
    
    // 更新敌人子弹
    enemyBullets.forEach(b => b.y += b.speed);
    enemyBullets = enemyBullets.filter(b => b.y < canvas.height);
    
    // 子弹击中敌人
    player.bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
            if (b.x < e.x + e.w && b.x + b.w > e.x &&
                b.y < e.y + e.h && b.y + b.h > e.y) {
                player.bullets.splice(bi, 1);
                e.hp--;
                if (e.hp <= 0) {
                    enemies.splice(ei, 1);
                    score += 10;
                    // 爆炸粒子
                    for (let i = 0; i < 10; i++) {
                        particles.push({
                            x: e.x + 20, y: e.y + 20,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            life: 30, color: '#ff0'
                        });
                    }
                }
            }
        });
    });
    
    // 敌人撞玩家
    enemies.forEach(e => {
        if (player.x < e.x + e.w && player.x + player.w > e.x &&
            player.y < e.y + e.h && player.y + player.h > e.y) {
            gameOver = true;
        }
    });
    
    // 敌人子弹击中玩家
    enemyBullets.forEach(b => {
        if (player.x < b.x + b.w && player.x + player.w > b.x &&
            player.y < b.y + b.h && player.y + player.h > b.y) {
            gameOver = true;
        }
    });
    
    // 粒子更新
    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
    });
    particles = particles.filter(p => p.life > 0);
    
    // 升级
    if (score > level * 200) level++;
}

function draw() {
    // 背景
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 星空
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 50; i++) {
        const x = (i * 97 + Date.now() * 0.01) % canvas.width;
        const y = (i * 73 + Date.now() * 0.02) % canvas.height;
        ctx.fillRect(x, y, 2, 2);
    }
    
    // 粒子
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    ctx.globalAlpha = 1;
    
    // 玩家子弹
    ctx.fillStyle = '#0ff';
    player.bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });
    
    // 敌人子弹
    ctx.fillStyle = '#f0f';
    enemyBullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });
    
    // 敌人
    enemies.forEach(e => {
        ctx.fillStyle = '#f44';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // 敌机眼睛
        ctx.fillStyle = '#ff0';
        ctx.fillRect(e.x + 8, e.y + 10, 8, 8);
        ctx.fillRect(e.x + 24, e.y + 10, 8, 8);
    });
    
    // 玩家
    if (!gameOver) {
        ctx.fillStyle = '#0f4';
        // 机身
        ctx.beginPath();
        ctx.moveTo(player.x + 20, player.y);
        ctx.lineTo(player.x + 40, player.y + 50);
        ctx.lineTo(player.x + 20, player.y + 40);
        ctx.lineTo(player.x, player.y + 50);
        ctx.closePath();
        ctx.fill();
        // 驾驶舱
        ctx.fillStyle = '#0ff';
        ctx.beginPath();
        ctx.arc(player.x + 20, player.y + 20, 8, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // UI
    ctx.fillStyle = '#0f0';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('SCORE: ' + score, 10, 30);
    ctx.fillText('LEVEL: ' + level, 350, 30);
    ctx.font = '14px Arial';
    ctx.fillText('← → 移动 | 空格 射击', 150, 680);
    
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f00';
        ctx.font = 'bold 50px Arial';
        ctx.fillText('GAME OVER', 100, 350);
        ctx.fillStyle = '#fff';
        ctx.font = '24px Arial';
        ctx.fillText('最终得分: ' + score, 160, 400);
        ctx.fillText('按 Enter 重新开始', 150, 450);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// 重置
document.addEventListener('keydown', e => {
    if (e.code === 'Enter' && gameOver) {
        player.x = 220;
        player.y = 600;
        player.bullets = [];
        enemies = [];
        enemyBullets = [];
        particles = [];
        score = 0;
        level = 1;
        gameOver = false;
    }
    // 空格也可以射击
    if (e.code === 'Space' && !gameOver) {
        player.bullets.push({ x: player.x + 15, y: player.y, w: 10, h: 20, speed: 10 });
    }
});

loop();
</script>
</body>
</html>
